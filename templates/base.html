<!-- Base layout with Bootstrap 5 navbar, used by all pages. Extend with {% extends "base.html" %} and {% block content %}. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Shop Accounting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">CSC Accounting</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/accounts/new">Add Account</a></li>
                    <li class="nav-item"><a class="nav-link" href="/transactions/new">Add Transaction</a></li>
                    <li class="nav-item"><a class="nav-link" href="/transactions/transfer">Transfer</a></li>
                    <li class="nav-item"><a class="nav-link" href="/categories/">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="/debts/">Debts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/receivables/">Receivables</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports/">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports/profits">Daily Profit</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logs">Logs</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
