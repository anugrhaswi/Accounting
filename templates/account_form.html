<!-- Rendered by new_account_form() / edit_account_form() at /accounts/new and /accounts/<id>/edit. Expects optional: account, error. -->
{% extends "base.html" %}
{% block content %}
<h2>{% if account %}Edit Account{% else %}Add Account{% endif %}</h2>
<form method="post" action="{% if account %}/accounts/{{ account.id }}/edit{% else %}/accounts/{% endif %}" class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Account Name</label>
        <input type="text" name="name" class="form-control" maxlength="100" required placeholder="e.g. Rionet, HDFC, Paytm" value="{{ account.name if account else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Type</label>
        <input type="text" name="type" class="form-control" maxlength="50" placeholder="e.g. Bank, Wallet, Cash" value="{{ account.type if account else 'General' }}">
    </div>
    <div class="col-md-8">
        <label class="form-label">Description (optional)</label>
        <input type="text" name="description" class="form-control" placeholder="Any notes" value="{{ account.description or '' }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">{% if account %}Save Changes{% else %}Create Account{% endif %}</button>
        <a href="/" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
{% if error %}
<div class="alert alert-danger mt-3">{{ error }}</div>
{% endif %}
{% endblock %}
